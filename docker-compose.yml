version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: music_db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: music_app
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: pg_data          # 👈 Имя тома
        target: /var/lib/postgresql/data  # 👈 Путь ВНУТРИ контейнера
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg_data:  # 👈 Объявление тома (обязательно!)
